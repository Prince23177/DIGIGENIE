    /* =================================================================
       GRAVITY (MAGNETIC) & 3D COMPONENTS
       ================================================================= */
    
    const Magnet = ({ children, padding = 100, strength = 0.4, className = '' }) => {
      const ref = useRef(null);
      const [position, setPosition] = useState({ x: 0, y: 0 });

      const handleMouse = (e) => {
        const { clientX, clientY } = e;
        const { height, width, left, top } = ref.current.getBoundingClientRect();
        const middleX = clientX - (left + width / 2);
        const middleY = clientY - (top + height / 2);
        setPosition({ x: middleX * strength, y: middleY * strength });
      };

      const reset = () => setPosition({ x: 0, y: 0 });

      return (
        <motion.div
          ref={ref}
          className={className}
          onMouseMove={handleMouse}
          onMouseLeave={reset}
          animate={{ x: position.x, y: position.y }}
          transition={{ type: "spring", stiffness: 150, damping: 15, mass: 0.1 }}
        >
          {children}
        </motion.div>
      );
    };

    const TiltCard = ({ children, className }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const mouseXSpring = useSpring(x);
      const mouseYSpring = useSpring(y);
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["15deg", "-15deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-15deg", "15deg"]);

      const handleMouseMove = (e) => {
        const rect = e.target.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const xPct = mouseX / width - 0.5;
        const yPct = mouseY / height - 0.5;
        x.set(xPct);
        y.set(yPct);
      };

      const handleMouseLeave = () => { x.set(0); y.set(0); };

      return (
        <motion.div
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{ rotateY, rotateX, transformStyle: "preserve-3d" }}
          className={`relative ${className}`}
        >
          {children}
        </motion.div>
      );
    };

    const FadeIn = ({ children, delay = 0, y = 40, className = "" }) => (

        className={className}
        initial={{ opacity: 0, y }}
        whileInView={{ opacity: 1, y: 0 }}
        viewport={{ once: true, margin: "-50px" }}

          <div className="max-w-7xl mx-auto flex flex-col gap-10 pb-40">
            {projects.map((proj, i) => (
              <div key={proj.num} className="sticky w-full glass-panel bg-white rounded-[40px] p-8 flex flex-col gap-8 shadow-xl" style={{ top: `${80 + (i * 30)}px` }}>
                <div className="flex justify-between items-center border-b border-black/10 pb-6">
                  <div className="flex items-center gap-6">
                    <span className="font-display font-black text-black text-5xl md:text-7xl">{proj.num}</span>
                    <div>
                      <span className="text-black font-semibold text-xs uppercase tracking-widest">{proj.category}</span>
                      <h3 className="font-display font-bold text-2xl md:text-4xl uppercase mt-1 text-black">{proj.name}</h3>
                    </div>
                  </div>
                  <Magnet>
                    <button className="hidden md:block rounded-full border border-black/20 px-6 py-3 text-sm font-semibold uppercase tracking-widest text-black hover:bg-black hover:text-white transition-colors">
                      View Live
                    </button>
                  </Magnet>
                </div>
                <div className="flex flex-col md:flex-row gap-6 h-[400px] md:h-[500px]">
                  <div className="w-full md:w-[40%] h-full overflow-hidden rounded-[20px] shadow-inner">
                    <img src={proj.img1} className="w-full h-full object-cover hover:scale-105 transition-transform duration-700" alt="View 1" />
                  </div>
                  <div className="w-full md:w-[60%] h-full overflow-hidden rounded-[20px] shadow-inner">
                    <img src={proj.img2} className="w-full h-full object-cover hover:scale-105 transition-transform duration-700" alt="Main View" />
                  </div>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    };

    /* =================================================================
       FOOTER SECTION
       ================================================================= */
    const FooterSection = () => (
      <footer className="bg-dark text-white py-20 px-8 lg:px-20 relative z-30">
        <div className="max-w-4xl mx-auto flex flex-col items-center text-center">
          <FadeIn>
            <h3 className="font-display font-black text-4xl md:text-5xl mb-8 uppercase">Contact Me</h3>
          </FadeIn>
          <FadeIn delay={0.1}>
            <div className="flex flex-col md:flex-row gap-6 md:gap-12 text-lg md:text-xl font-bold mb-12">
              <a href="tel:+918360187994" className="hover:text-brand transition-colors">+91 83601 87994</a>
               <a href="tel:+919888287024" className="hover:text-brand transition-colors">+91 98882 87024</a>
           
              <a href="mailto:digigenie13@gmail.com" className="hover:text-brand transition-colors">digigenie13@gmail.com</a>
            </div>
          </FadeIn>
          <FadeIn delay={0.2}>
            <p className="text-sm text-white/40 font-semibold uppercase tracking-widest border-t border-white/10 pt-8 w-full max-w-md mx-auto">
              Designed by Digigenie </p>
          </FadeIn>
        </div>
      </footer>
    );

    /* =================================================================
       3D CHAT BOX
       ================================================================= */
    const ChatBox = () => {
      const [isOpen, setIsOpen] = useState(false);
      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const [msg, setMsg] = useState("");

      const handleSendWhatsApp = () => {
        if (!name.trim() || !msg.trim()) {
          alert("Please enter at least your Name and Message.");
          return;
        }
        const whatsappNumber = "918360187994";
        const text = `Hello,%0A%0A*Name:* ${encodeURIComponent(name)}%0A*Phone:* ${encodeURIComponent(phone)}%0A*Message:* ${encodeURIComponent(msg)}`;
        window.open(`https://wa.me/${whatsappNumber}?text=${text}`, '_blank');
        setName(""); setPhone(""); setMsg("");
        setIsOpen(false);
      };

      return (
        <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
          <motion.div
            initial={false}
            animate={isOpen ? "open" : "closed"}
            variants={{
              open: { opacity: 1, scale: 1, y: 0, pointerEvents: "auto", transition: { type: "spring", stiffness: 200, damping: 20 } },
              closed: { opacity: 0, scale: 0.8, y: 20, pointerEvents: "none" }
            }}
            className="mb-4 w-[90vw] sm:w-96 rounded-[30px] p-6 sm:p-8 glass-panel origin-bottom-right shadow-2xl border border-black/5 bg-white/95 backdrop-blur-xl"
          >
            <div className="flex justify-between items-center mb-6">
              <h3 className="font-display text-xl font-bold uppercase tracking-wider flex items-center gap-2 text-black">
                <span className="w-2 h-2 rounded-full bg-brand animate-pulse"></span>
                Quick Connect
              </h3>
              <button onClick={() => setIsOpen(false)} className="text-black/40 hover:text-black text-2xl">&times;</button>
            </div>
            <form className="flex flex-col gap-4 relative z-10">
              <input 
                type="text" 
                placeholder="Your Name" 
                value={name}
                onChange={(e) => setName(e.target.value)}
                className="bg-base text-black placeholder-black/50 border border-black/10 rounded-xl px-4 py-3.5 outline-none focus:border-brand focus:ring-2 focus:ring-brand/30 transition-all text-sm font-medium" 
              />
              <input 
                type="tel" 
                placeholder="Mobile Number" 
                value={phone}
                onChange={(e) => setPhone(e.target.value)}
                className="bg-base text-black placeholder-black/50 border border-black/10 rounded-xl px-4 py-3.5 outline-none focus:border-brand focus:ring-2 focus:ring-brand/30 transition-all text-sm font-medium" 
              />
              <textarea 
                placeholder="How can I help you?" 
                rows="3" 
                value={msg}
                onChange={(e) => setMsg(e.target.value)}
                className="bg-base text-black placeholder-black/50 border border-black/10 rounded-xl px-4 py-3.5 outline-none focus:border-brand focus:ring-2 focus:ring-brand/30 transition-all text-sm font-medium resize-none"
              ></textarea>
              
              <button 
                type="button" 
                onClick={handleSendWhatsApp}
                className="mt-2 bg-dark text-white rounded-xl px-6 py-3.5 text-sm font-bold uppercase tracking-widest hover:scale-105 hover:bg-brand hover:text-dark transition-all"
              >
                Send Message
              </button>
            </form>
          </motion.div>

          <Magnet strength={0.2}>
            <button 
              onClick={() => setIsOpen(!isOpen)}
              className="w-16 h-16 rounded-full flex items-center justify-center bg-dark text-white shadow-2xl hover:scale-110 hover:bg-brand hover:text-dark transition-all"
            >
              {isOpen ? (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
              ) : (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6-.097 1.016-.417 2.13-.771 2.966-.079.186.074.394.273.362 2.256-.37 3.597-.938 4.18-1.234A9.06 9.06 0 0 0 8 15z"/></svg>
              )}
            </button>
          </Magnet>
        </div>
      );
    };

    /* =================================================================
       APP CONTAINER
       ================================================================= */
    const App = () => {
      const [showContactPage, setShowContactPage] = useState(false);

      if (showContactPage) {
        return <ContactPage onBack={() => setShowContactPage(false)} />;
      }

      return (
        <div className="font-sans bg-base min-h-screen relative overflow-hidden">
          {/* Subtle Green Glow Background */}
          <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[600px] bg-gradient-to-br from-[#d4fba6] via-[#e7fcbd]/40 to-transparent pointer-events-none -z-0 blur-3xl opacity-80"></div>
          
          <div className="relative z-10">
            <Navbar onContactClick={() => setShowContactPage(true)} />
            <ModernAboutSection />
            <ProjectsSection />
            <FooterSection />
            <ChatBox />
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
